        rankings_body_ssl: 'Cuando tienes SSL disponible, tu web tendrá una mejor posición y será indexada correctamente.'
        rankings_heading: 'Motores de búsqueda {icon} conexiones seguras'
        what_body: 'La mayoría de personas conoce <b>https</b>, utilizado para conexiones seguras, como SSL: <i>Secure Sockets Layer</i>. Oficialmente se llama TLS: <i>Transport Layer Security</i>. Este sistema crea una conexión segura con tu servidor web, evitando que atacantes u otros servidores puedan hacerse pasar por tu sitio y manteniendo protegidos a tus visitantes. Si la conexión SSL falla, el navegador mostrará una advertencia indicando que la página no es segura.'
        what_heading: '¿Qué es SSL o TLS?'
